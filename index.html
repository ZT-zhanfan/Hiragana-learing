<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Han's Kana | 日系現代五十音</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    /* 色彩定義 */
    --sky-top: #c8e8ff;
    --sky-low: #f5ece0;
    --accent: #c0392b; 
    --ink: #2c2c34;
    --ink-mid: #5a5a68;
    --ink-label: #34495e; /* 深靛藍權威色 */
    
    /* 強化版玻璃擬態：調高不透明度確保對比 */
    --glass-bg: rgba(255, 255, 255, 0.85); 
    --glass-border: rgba(255, 255, 255, 0.95);
    --glass-shadow: 0 4px 16px rgba(0,0,0,0.06);
    
    --hud-bg: rgba(255, 255, 255, 0.9);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
    min-height: 100vh;
    font-family: 'Outfit', 'Noto Sans TC', sans-serif;
    color: var(--ink);
    background: var(--sky-top);
    overflow-x: hidden;
}

/* ── 背景層次 ── */
.scene { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.sky-layer {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, var(--sky-top) 0%, #eef5ff 45%, var(--sky-low) 100%);
}
.car-scene {
    position: absolute; bottom: 15%; left: 50%;
    transform: translateX(-50%); width: min(480px, 80vw); z-index: 1;
}
.car-scene img {
    width: 100%; mix-blend-mode: multiply; opacity: 0.85;
    -webkit-mask-image: radial-gradient(ellipse 85% 80% at 50% 50%, black 40%, transparent 95%);
    mask-image: radial-gradient(ellipse 85% 80% at 50% 50%, black 40%, transparent 95%);
}

/* ── HUD 頂欄 ── */
.hud {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 28px; background: var(--hud-bg);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
}
.hud-logo { font-weight: 600; font-size: 1.25rem; letter-spacing: 0.05em; color: var(--accent); }
.hud-logo span { color: var(--ink); font-weight: 400; }
.hud-time { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 500; color: var(--ink); }

/* ── 主要內容 ── */
.main { position: relative; z-index: 10; padding: 0 16px 60px; max-width: 860px; margin: 0 auto; }

/* 頁籤切換 */
.tabs { display: flex; justify-content: center; gap: 8px; padding: 24px 0 10px; flex-wrap: wrap; }
.tab {
    font-family: 'Outfit', sans-serif; font-size: 0.9rem; padding: 8px 22px; border-radius: 25px;
    border: 1.5px solid rgba(0,0,0,0.1); background: var(--glass-bg);
    color: var(--ink-mid); cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(192,57,43,0.2); }

/* 控制項 */
.controls { display: flex; justify-content: center; gap: 12px; padding: 10px 0 20px; min-height: 60px; }
.ctrl-btn {
    padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.08);
    background: #fff; cursor: pointer; font-size: 0.85rem; color: var(--ink-mid);
    transition: 0.2s;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── 五十音網格 ── */
.section-label {
    font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.85rem;
    letter-spacing: 0.15em; color: var(--ink-label); /* 深靛藍提升對比 */
    text-align: center; margin: 30px 0 15px; text-transform: uppercase;
}
.kana-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.kana-cell {
    background: var(--glass-bg); backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border); border-radius: 14px;
    padding: 16px 4px; text-align: center; transition: all 0.3s ease;
    box-shadow: var(--glass-shadow);
}
.kana-cell.highlight { 
    border-color: var(--accent); 
    background: #fff; 
    transform: scale(1.05); 
    box-shadow: 0 8px 24px rgba(192,57,43,0.15); 
}
.kana-char { font-family: 'Noto Sans JP', sans-serif; font-size: 1.8rem; font-weight: 300; color: var(--ink); display: block; }
.kana-roman { font-family: 'Outfit', sans-serif; font-size: 0.75rem; color: var(--accent); margin-top: 6px; display: block; min-height: 15px; transition: 0.2s; }
.kana-roman.hidden { opacity: 0; }
.kana-cell.empty { background: transparent; border: none; box-shadow: none; pointer-events: none; }

/* ── 對照模式專用樣式 ── */
.comp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.comp-card { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 12px 20px; flex-direction: row; 
}
.comp-sub { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.comp-type { font-size: 0.65rem; color: var(--ink-label); font-weight: 600; opacity: 0.6; }

@media (max-width: 480px) {
    .comp-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="scene">
    <div class="sky-layer"></div>
    <div class="car-scene"><img src="rx7.png" alt="Car Background"></div>
</div>

<div class="hud">
    <div class="hud-logo">HAN'S <span>五十音</span></div>
    <div class="hud-time" id="clock">00:00:00</div>
</div>

<div class="main">
    <div class="tabs">
        <button class="tab active" onclick="switchMode('hira')">平假名</button>
        <button class="tab" onclick="switchMode('kata')">片假名</button>
        <button class="tab" onclick="switchMode('both')">同步對照</button>
    </div>

    <div class="controls">
        <button class="ctrl-btn" onclick="toggleRomaji()">🔤 遮蔽讀音</button>
        <button class="ctrl-btn" id="rand-btn" onclick="highlightRandom()">🎲 隨機考驗</button>
    </div>

    <div id="content-area"></div>
</div>

<script>
// 數據定義
const kanaData = {
    rows: ["a","ka","sa","ta","na","ha","ma","ya","ra","wa"],
    labels: ["あ行 · A", "か行 · Ka", "さ行 · Sa", "た行 · Ta", "な行 · Na", "は行 · Ha", "ま行 · Ma", "や行 · Ya", "ら行 · Ra", "わ行 · Wa"],
    hira: {
        a: [{k:'あ',r:'a'},{k:'い',r:'i'},{k:'う',r:'u'},{k:'え',r:'e'},{k:'お',r:'o'}],
        ka:[{k:'か',r:'ka'},{k:'き',r:'ki'},{k:'く',r:'ku'},{k:'け',r:'ke'},{k:'こ',r:'ko'}],
        sa:[{k:'さ',r:'sa'},{k:'し',r:'shi'},{k:'す',r:'su'},{k:'せ',r:'se'},{k:'そ',r:'so'}],
        ta:[{k:'た',r:'ta'},{k:'ち',r:'chi'},{k:'つ',r:'tsu'},{k:'て',r:'te'},{k:'止',r:'to'}],
        na:[{k:'な',r:'na'},{k:'に',r:'ni'},{k:'ぬ',r:'nu'},{k:'ね',r:'ne'},{k:'の',r:'no'}],
        ha:[{k:'は',r:'ha'},{k:'ひ',r:'hi'},{k:'ふ',r:'fu'},{k:'へ',r:'he'},{k:'ほ',r:'ho'}],
        ma:[{k:'ま',r:'ma'},{k:'み',r:'mi'},{k:'む',r:'mu'},{k:'め',r:'me'},{k:'も',r:'mo'}],
        ya:[{k:'や',r:'ya'},{k:'',r:''},{k:'ゆ',r:'yu'},{k:'',r:''},{k:'よ',r:'yo'}],
        ra:[{k:'ら',r:'ra'},{k:'り',r:'ri'},{k:'る',r:'ru'},{k:'れ',r:'re'},{k:'ろ',r:'ro'}],
        wa:[{k:'わ',r:'wa'},{k:'',r:''},{k:'',r:''},{k:'',r:''},{k:'を',r:'wo'}]
    },
    kata: {
        a: [{k:'ア',r:'a'},{k:'イ',r:'i'},{k:'ウ',r:'u'},{k:'エ',r:'e'},{k:'オ',r:'o'}],
        ka:[{k:'カ',r:'ka'},{k:'キ',r:'ki'},{k:'ク',r:'ku'},{k:'ケ',r:'ke'},{k:'コ',r:'ko'}],
        sa:[{k:'サ',r:'sa'},{k:'シ',r:'shi'},{k:'ス',r:'su'},{k:'セ',r:'se'},{k:'ソ',r:'so'}],
        ta:[{k:'タ',r:'ta'},{k:'チ',r:'chi'},{k:'ツ',r:'tsu'},{k:'テ',r:'te'},{k:'ト',r:'to'}],
        na:[{k:'ナ',r:'na'},{k:'ニ',r:'ni'},{k:'ヌ',r:'nu'},{k:'ネ',r:'ne'},{k:'ノ',r:'no'}],
        ha:[{k:'ハ',r:'ha'},{k:'ヒ',r:'hi'},{k:'フ',r:'fu'},{k:'ヘ',r:'he'},{k:'ホ',r:'ho'}],
        ma:[{k:'マ',r:'ma'},{k:'ミ',r:'mi'},{k:'ム',r:'mu'},{k:'メ',r:'me'},{k:'モ',r:'mo'}],
        ya:[{k:'ヤ',r:'ya'},{k:'',r:''},{k:'ユ',r:'yu'},{k:'',r:''},{k:'ヨ',r:'yo'}],
        ra:[{k:'ラ',r:'ra'},{k:'リ',r:'ri'},{k:'ル',r:'ru'},{k:'レ',r:'re'},{k:'ロ',r:'ro'}],
        wa:[{k:'ワ',r:'wa'},{k:'',r:''},{k:'',r:''},{k:'',r:''},{k:'ヲ',r:'wo'}]
    }
};

let currentMode = 'hira'; // hira, kata, both
let showRomaji = true;
let lastHighlighted = null;

function switchMode(mode) {
    currentMode = mode;
    // 更新頁籤 UI
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', 
            (mode === 'hira' && t.innerText === '平假名') || 
            (mode === 'kata' && t.innerText === '片假名') || 
            (mode === 'both' && t.innerText === '同步對照')
        );
    });
    
    // 對照模式不提供隨機考驗
    document.getElementById('rand-btn').style.display = mode === 'both' ? 'none' : 'inline-block';
    
    render();
}

function render() {
    const area = document.getElementById('content-area');
    area.innerHTML = '';
    
    kanaData.rows.forEach((rowKey, index) => {
        const section = document.createElement('div');
        section.className = 'kana-section';
        section.innerHTML = `<div class="section-label">${kanaData.labels[index]}</div>`;
        
        const grid = document.createElement('div');
        grid.className = currentMode === 'both' ? 'comp-grid' : 'kana-grid';
        
        kanaData.hira[rowKey].forEach((hItem, idx) => {
            const kItem = kanaData.kata[rowKey][idx];
            
            if (currentMode === 'both') {
                if (!hItem.k) return; // 跳過空位
                const cell = document.createElement('div');
                cell.className = 'kana-cell comp-card';
                cell.innerHTML = `
                    <div class="comp-sub"><span class="comp-type">平</span><span class="kana-char">${hItem.k}</span></div>
                    <div class="kana-roman ${showRomaji ? '' : 'hidden'}">${hItem.r}</div>
                    <div class="comp-sub"><span class="comp-type">片</span><span class="kana-char">${kItem.k}</span></div>
                `;
                grid.appendChild(cell);
            } else {
                const target = currentMode === 'hira' ? hItem : kItem;
                const cell = document.createElement('div');
                cell.className = target.k ? 'kana-cell' : 'kana-cell empty';
                if (target.k) {
                    cell.innerHTML = `
                        <span class="kana-char">${target.k}</span>
                        <span class="kana-roman ${showRomaji ? '' : 'hidden'}">${target.r}</span>
                    `;
                }
                grid.appendChild(cell);
            }
        });
        
        section.appendChild(grid);
        area.appendChild(section);
    });
}

function toggleRomaji() {
    showRomaji = !showRomaji;
    document.querySelectorAll('.kana-roman').forEach(el => el.classList.toggle('hidden', !showRomaji));
}

function highlightRandom() {
    if (lastHighlighted) lastHighlighted.classList.remove('highlight');
    const cells = Array.from(document.querySelectorAll('.kana-cell:not(.empty):not(.comp-card)'));
    if (cells.length === 0) return;
    
    const pick = cells[Math.floor(Math.random() * cells.length)];
    pick.classList.add('highlight');
    pick.scrollIntoView({ behavior: 'smooth', block: 'center' });
    lastHighlighted = pick;
}

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
}

setInterval(updateClock, 1000);
updateClock();
switchMode('hira'); // 初始化
</script>
</body>
</html>
