<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Han's Hiragana | 五十音</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e8192c;
  --amber: #f5a623;
  --white: #f0ede8;
  --dim: rgba(240,237,232,0.55);
  --glass: rgba(8,6,14,0.72);
  --glass2: rgba(8,6,14,0.55);
  --border: rgba(240,237,232,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #04020a;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--white);
  overflow-x: hidden;
}

/* ── Shibuya scene ── */
.scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

/* Asphalt road base */
.road {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 60% at 50% 100%, #1a1520 0%, #0a0812 60%, #04020a 100%);
}

/* Crosswalk stripes */
.crosswalk {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 55vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 0;
}
.stripe {
  height: 28px;
  background: rgba(240,237,232,0.06);
  margin-bottom: 20px;
  border-radius: 2px;
}

/* City glow at horizon */
.horizon-glow {
  position: absolute;
  bottom: 38%;
  left: 0;
  right: 0;
  height: 200px;
  background:
    radial-gradient(ellipse 40% 80% at 20% 100%, rgba(232,25,44,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 100% at 50% 100%, rgba(245,166,35,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 40% 80% at 80% 100%, rgba(100,120,255,0.12) 0%, transparent 70%);
}

/* Neon signs background suggestion */
.neon-bg {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 35%;
  background:
    radial-gradient(ellipse 30% 60% at 15% 40%, rgba(232,25,44,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 25% 50% at 85% 30%, rgba(100,160,255,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 20% 40% at 60% 60%, rgba(245,166,35,0.06) 0%, transparent 70%);
}

/* Rain streaks */
.rain {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.raindrop {
  position: absolute;
  top: -10%;
  width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(180,200,255,0.25), transparent);
  animation: fall linear infinite;
}
@keyframes fall {
  to { transform: translateY(110vh); }
}

/* RX-7 SVG car scene */
.car-scene {
  position: absolute;
  bottom: 12%;
  left: 50%;
  transform: translateX(-50%);
  width: min(520px, 88vw);
  z-index: 2;
}

/* Tire smoke */
.smoke-wrap {
  position: absolute;
  bottom: 18px;
  right: -40px;
  pointer-events: none;
}
.smoke {
  position: absolute;
  border-radius: 50%;
  background: rgba(200,200,210,0.15);
  animation: puff ease-out infinite;
}
@keyframes puff {
  0%   { transform: scale(0) translateY(0); opacity: 0.5; }
  100% { transform: scale(3) translateY(-30px); opacity: 0; }
}

/* Road reflection */
.reflection {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(520px, 88vw);
  height: 60px;
  background: linear-gradient(to bottom, rgba(232,25,44,0.08), transparent);
  filter: blur(8px);
  z-index: 1;
}

/* ── HUD top bar ── */
.hud {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.hud-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.12em;
  color: var(--red);
  text-shadow: 0 0 20px rgba(232,25,44,0.5);
}
.hud-logo span { color: var(--white); }
.hud-clock {
  text-align: right;
}
.hud-time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.08em;
  color: var(--amber);
  text-shadow: 0 0 12px rgba(245,166,35,0.5);
  font-variant-numeric: tabular-nums;
}
.hud-date {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.12em;
  text-align: right;
}

/* ── Main content ── */
.main {
  position: relative;
  z-index: 10;
  padding: 0 16px 40px;
  max-width: 1000px;
  margin: 0 auto;
}

/* ── Controls ── */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 20px 0 16px;
  flex-wrap: wrap;
}
.ctrl-btn {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.1em;
  font-size: 0.95rem;
  padding: 9px 22px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--glass2);
  color: var(--white);
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: all 0.2s;
}
.ctrl-btn:hover { border-color: rgba(240,237,232,0.3); background: rgba(240,237,232,0.08); }
.ctrl-btn.active {
  background: var(--red);
  border-color: var(--red);
  box-shadow: 0 0 20px rgba(232,25,44,0.4);
}
.ctrl-btn.amber {
  border-color: rgba(245,166,35,0.4);
  color: var(--amber);
}
.ctrl-btn.amber:hover { border-color: var(--amber); }

.section-label {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.25em;
  font-size: 0.75rem;
  color: var(--red);
  text-shadow: 0 0 12px rgba(232,25,44,0.5);
  text-align: center;
  margin-bottom: 10px;
}

/* ── Kana grid ── */
.kana-section {
  margin-bottom: 24px;
}
.kana-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.kana-cell {
  background: var(--glass2);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 6px 8px;
  text-align: center;
  transition: border-color 0.2s, transform 0.15s;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.kana-cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(232,25,44,0.04), transparent);
  pointer-events: none;
}
.kana-cell:hover {
  border-color: rgba(232,25,44,0.4);
  transform: translateY(-2px);
}
.kana-cell.empty {
  background: transparent;
  border-color: transparent;
  pointer-events: none;
}
.kana-char {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1.7rem;
  font-weight: 300;
  color: var(--white);
  line-height: 1;
  display: block;
  text-shadow: 0 0 10px rgba(240,237,232,0.2);
}
.kana-roman {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: var(--amber);
  margin-top: 5px;
  display: block;
  transition: opacity 0.25s;
  min-height: 14px;
}
.kana-roman.hidden { opacity: 0; }

/* ── Section tabs ── */
.tabs {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tab {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.15em;
  font-size: 0.85rem;
  padding: 6px 16px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.2s;
}
.tab:hover { color: var(--white); border-color: rgba(240,237,232,0.25); }
.tab.active {
  color: var(--red);
  border-color: var(--red);
  background: rgba(232,25,44,0.08);
  text-shadow: 0 0 12px rgba(232,25,44,0.4);
}

/* ── Car SVG ── */
.car-scene svg { width: 100%; height: auto; }

/* ── Scanline overlay ── */
.scanlines {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.04) 4px
  );
}

/* ── Red light bar (like police/drift) ── */
.light-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--red), var(--amber), var(--red), transparent);
  z-index: 20;
  animation: scan 3s linear infinite;
  opacity: 0.7;
}
@keyframes scan {
  0% { transform: scaleX(0); transform-origin: left; }
  50% { transform: scaleX(1); transform-origin: left; }
  50.01% { transform: scaleX(1); transform-origin: right; }
  100% { transform: scaleX(0); transform-origin: right; }
}
</style>
</head>
<body>

<div class="light-bar"></div>
<div class="scanlines"></div>

<!-- Background scene -->
<div class="scene">
  <div class="road"></div>
  <div class="neon-bg"></div>

  <!-- Crosswalk -->
  <div class="crosswalk">
    <div class="stripe"></div>
    <div class="stripe"></div>
    <div class="stripe"></div>
    <div class="stripe"></div>
    <div class="stripe"></div>
    <div class="stripe"></div>
  </div>

  <div class="horizon-glow"></div>

  <!-- Rain -->
  <div class="rain" id="rain"></div>

  <!-- Car scene SVG -->
  <div class="car-scene">
    <!-- Tire smoke -->
    <div class="smoke-wrap">
      <div class="smoke" style="width:60px;height:60px;left:-20px;bottom:0;animation-duration:2.1s;animation-delay:0s"></div>
      <div class="smoke" style="width:80px;height:80px;left:-10px;bottom:5px;animation-duration:2.8s;animation-delay:0.7s"></div>
      <div class="smoke" style="width:50px;height:50px;left:0px;bottom:-5px;animation-duration:1.9s;animation-delay:1.3s"></div>
    </div>

    <!-- RX-7 FD SVG (side silhouette) -->
    <svg viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#c0140f"/>
          <stop offset="50%" stop-color="#8a0e09"/>
          <stop offset="100%" stop-color="#3a0604"/>
        </linearGradient>
        <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#d01510"/>
          <stop offset="100%" stop-color="#7a0c08"/>
        </linearGradient>
        <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#0a1a2a" stop-opacity="0.9"/>
        </linearGradient>
        <radialGradient id="wheelGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#3a3a4a"/>
          <stop offset="70%" stop-color="#1a1a22"/>
          <stop offset="100%" stop-color="#0a0a12"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="redglow">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e8192c" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
      </defs>

      <!-- Ground reflection/glow -->
      <ellipse cx="260" cy="185" rx="220" ry="18" fill="url(#groundGrad)" opacity="0.6"/>
      <ellipse cx="260" cy="190" rx="200" ry="10" fill="rgba(232,25,44,0.12)"/>

      <!-- === RX-7 FD Body === -->
      <!-- Main body lower -->
      <path d="M60,150 Q65,140 80,135 L120,128 L160,120 Q200,112 230,110 Q280,108 320,110 L380,115 Q420,118 450,125 L480,135 Q495,140 498,150 L498,162 Q490,168 60,168 Z" fill="url(#bodyGrad)"/>

      <path d="M200,74 Q218,64 242,60 L288,60 Q310,62 330,72 L308,108 Q285,106 255,106 Q228,106 210,108 Z" fill="url(#glassGrad)" opacity="0.85"/>
      <!-- Windshield highlight -->

      <!-- Front bumper / nose — very low FD nose -->

      <rect x="330" y="130" width="20" height="5" rx="2.5" fill="rgba(200,180,160,0.4)"/>

      <!-- Side vent (FD signature) -->
      <rect x="155" y="128" width="32" height="8" rx="1" fill="rgba(0,0,0,0.5)"/>
      <line x1="158" y1="129" x2="158" y2="135" stroke="rgba(60,6,4,0.8)" stroke-width="1.5"/>
      <line x1="163" y1="129" x2="163" y2="135" stroke="rgba(60,6,4,0.8)" stroke-width="1.5"/>
      <line x1="168" y1="129" x2="168" y2="135" stroke="rgba(60,6,4,0.8)" stroke-width="1.5"/>
      <line x1="173" y1="129" x2="173" y2="135" stroke="rgba(60,6,4,0.8)" stroke-width="1.5"/>
      <line x1="178" y1="129" x2="178" y2="135" stroke="rgba(60,6,4,0.8)" stroke-width="1.5"/>

      <!-- Side mirror -->
      <path d="M190,96 Q196,93 202,95 L200,104 Q195,103 190,104 Z" fill="#6a0a07"/>

      <!-- Wheels -->
      <!-- Front wheel -->
      <circle cx="148" cy="168" r="34" fill="url(#wheelGrad)" stroke="#2a2a35" stroke-width="1.5"/>
      <circle cx="148" cy="168" r="26" fill="none" stroke="#3a3a48" stroke-width="1"/>

      <!-- Spokes front -->
      <line x1="148" y1="142" x2="148" y2="194" stroke="#4a4a58" stroke-width="2"/>
      <line x1="122" y1="168" x2="174" y2="168" stroke="#4a4a58" stroke-width="2"/>
      <line x1="129" y1="149" x2="167" y2="187" stroke="#4a4a58" stroke-width="2"/>

      <circle cx="148" cy="168" r="7" fill="#3a3a48"/>

      <path d="M122,155 Q130,148 145,145" stroke="rgba(255,255,255,0.12)" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- Rear wheel -->
      <circle cx="400" cy="168" r="36" fill="url(#wheelGrad)" stroke="#2a2a35" stroke-width="1.5"/>

      <!-- === Han figure leaning on car === -->
      <g transform="translate(268, 45)">

        <!-- Body / jacket -->

        <!-- Neck -->

        <!-- Head -->

      <!-- Speed lines (drift energy) -->
      <line x1="0" y1="100" x2="50" y2="102" stroke="rgba(232,25,44,0.15)" stroke-width="1.5"/>
      <line x1="0" y1="110" x2="40" y2="112" stroke="rgba(232,25,44,0.1)" stroke-width="1"/>
      <line x1="0" y1="120" x2="55" y2="121" stroke="rgba(232,25,44,0.08)" stroke-width="1"/>
      <line x1="0" y1="130" x2="35" y2="131" stroke="rgba(245,166,35,0.08)" stroke-width="1"/>
      <line x1="0" y1="90" x2="45" y2="92" stroke="rgba(232,25,44,0.06)" stroke-width="0.8"/>
    </svg>
  </div>

  <div class="reflection"></div>
</div>

<!-- HUD Bar -->
<div class="hud">
  <div class="hud-logo">Han's<span> 五十音</span></div>
  <div class="hud-clock">
    <div class="hud-time" id="clock">00:00:00</div>
    <div class="hud-date" id="date-display">---</div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Tabs -->
  <div style="padding-top:20px">
    <div class="tabs">
      <button class="tab active" onclick="showSection('seion')">清音</button>
      <button class="tab" onclick="showSection('dakuten')">濁音</button>
      <button class="tab" onclick="showSection('youon')">拗音</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn amber" id="toggle-btn" onclick="toggleRomaji()">🔤 遮蔽讀音</button>
    <button class="ctrl-btn" onclick="highlightRandom()">🎲 隨機考驗</button>
    <button class="ctrl-btn" onclick="clearHighlight()">✕ 清除選取</button>
  </div>

  <!-- Seion section -->
  <div id="section-seion">
    <div class="kana-section">
      <div class="section-label">▸ あ行 · A row</div>
      <div class="kana-grid" id="grid-a"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ か行 · Ka row</div>
      <div class="kana-grid" id="grid-ka"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ さ行 · Sa row</div>
      <div class="kana-grid" id="grid-sa"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ た行 · Ta row</div>
      <div class="kana-grid" id="grid-ta"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ な行 · Na row</div>
      <div class="kana-grid" id="grid-na"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ は行 · Ha row</div>
      <div class="kana-grid" id="grid-ha"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ ま行 · Ma row</div>
      <div class="kana-grid" id="grid-ma"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ や行 · Ya row</div>
      <div class="kana-grid" id="grid-ya"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ ら行 · Ra row</div>
      <div class="kana-grid" id="grid-ra"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ わ行 · Wa row + ん</div>
      <div class="kana-grid" id="grid-wa"></div>
    </div>
  </div>

  <!-- Dakuten section -->
  <div id="section-dakuten" style="display:none">
    <div class="kana-section">
      <div class="section-label">▸ が行 · Ga row</div>
      <div class="kana-grid" id="grid-ga"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ ざ行 · Za row</div>
      <div class="kana-grid" id="grid-za"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ だ行 · Da row</div>
      <div class="kana-grid" id="grid-da"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ ば行 · Ba row</div>
      <div class="kana-grid" id="grid-ba"></div>
    </div>
    <div class="kana-section">
      <div class="section-label">▸ ぱ行 · Pa row（半濁音）</div>
      <div class="kana-grid" id="grid-pa"></div>
    </div>
  </div>

  <!-- Youon section -->
  <div id="section-youon" style="display:none">
    <div class="kana-section">
      <div class="section-label">▸ 拗音 · Combined sounds</div>
      <div class="kana-grid" style="grid-template-columns:repeat(3,1fr)" id="grid-youon"></div>
    </div>
  </div>
</div>

<script>
// ── Data ──
const seionRows = {
  a:  [{k:'あ',r:'a'},{k:'い',r:'i'},{k:'う',r:'u'},{k:'え',r:'e'},{k:'お',r:'o'}],
  ka: [{k:'か',r:'ka'},{k:'き',r:'ki'},{k:'く',r:'ku'},{k:'け',r:'ke'},{k:'こ',r:'ko'}],
  sa: [{k:'さ',r:'sa'},{k:'し',r:'shi'},{k:'す',r:'su'},{k:'せ',r:'se'},{k:'そ',r:'so'}],
  ta: [{k:'た',r:'ta'},{k:'ち',r:'chi'},{k:'つ',r:'tsu'},{k:'て',r:'te'},{k:'と',r:'to'}],
  na: [{k:'な',r:'na'},{k:'に',r:'ni'},{k:'ぬ',r:'nu'},{k:'ね',r:'ne'},{k:'の',r:'no'}],
  ha: [{k:'は',r:'ha'},{k:'ひ',r:'hi'},{k:'ふ',r:'fu'},{k:'へ',r:'he'},{k:'ほ',r:'ho'}],
  ma: [{k:'ま',r:'ma'},{k:'み',r:'mi'},{k:'む',r:'mu'},{k:'め',r:'me'},{k:'も',r:'mo'}],
  ya: [{k:'や',r:'ya'},{k:'',r:''},{k:'ゆ',r:'yu'},{k:'',r:''},{k:'よ',r:'yo'}],
  ra: [{k:'ら',r:'ra'},{k:'り',r:'ri'},{k:'る',r:'ru'},{k:'れ',r:'re'},{k:'ろ',r:'ro'}],
  wa: [{k:'わ',r:'wa'},{k:'',r:''},{k:'',r:''},{k:'',r:''},{k:'を',r:'wo'},{k:'ん',r:'n'},{k:'',r:''},{k:'',r:''},{k:'',r:''},{k:''}]
};
const dakutenRows = {
  ga: [{k:'が',r:'ga'},{k:'ぎ',r:'gi'},{k:'ぐ',r:'gu'},{k:'げ',r:'ge'},{k:'ご',r:'go'}],
  za: [{k:'ざ',r:'za'},{k:'じ',r:'ji'},{k:'ず',r:'zu'},{k:'ぜ',r:'ze'},{k:'ぞ',r:'zo'}],
  da: [{k:'だ',r:'da'},{k:'ぢ',r:'di'},{k:'づ',r:'du'},{k:'で',r:'de'},{k:'ど',r:'do'}],
  ba: [{k:'ば',r:'ba'},{k:'び',r:'bi'},{k:'ぶ',r:'bu'},{k:'べ',r:'be'},{k:'ぼ',r:'bo'}],
  pa: [{k:'ぱ',r:'pa'},{k:'ぴ',r:'pi'},{k:'ぷ',r:'pu'},{k:'ぺ',r:'pe'},{k:'ぽ',r:'po'}]
};
const youonList = [
  {k:'きゃ',r:'kya'},{k:'きゅ',r:'kyu'},{k:'きょ',r:'kyo'},
  {k:'しゃ',r:'sha'},{k:'しゅ',r:'shu'},{k:'しょ',r:'sho'},
  {k:'ちゃ',r:'cha'},{k:'ちゅ',r:'chu'},{k:'ちょ',r:'cho'},
  {k:'にゃ',r:'nya'},{k:'にゅ',r:'nyu'},{k:'にょ',r:'nyo'},
  {k:'ひゃ',r:'hya'},{k:'ひゅ',r:'hyu'},{k:'ひょ',r:'hyo'},
  {k:'みゃ',r:'mya'},{k:'みゅ',r:'myu'},{k:'みょ',r:'myo'},
  {k:'りゃ',r:'rya'},{k:'りゅ',r:'ryu'},{k:'りょ',r:'ryo'},
  {k:'ぎゃ',r:'gya'},{k:'ぎゅ',r:'gyu'},{k:'ぎょ',r:'gyo'},
  {k:'じゃ',r:'ja'},{k:'じゅ',r:'ju'},{k:'じょ',r:'jo'},
  {k:'びゃ',r:'bya'},{k:'びゅ',r:'byu'},{k:'びょ',r:'byo'},
  {k:'ぴゃ',r:'pya'},{k:'ぴゅ',r:'pyu'},{k:'ぴょ',r:'pyo'}
];

let showRomaji = true;

function buildCell(item) {
  const cell = document.createElement('div');
  if (!item.k) { cell.className = 'kana-cell empty'; return cell; }
  cell.className = 'kana-cell';
  cell.dataset.kana = item.k;
  cell.innerHTML = `<span class="kana-char">${item.k}</span><span class="kana-roman${showRomaji ? '' : ' hidden'}">${item.r}</span>`;
  return cell;
}

function buildGrid(id, items) {
  const grid = document.getElementById(id);
  if (!grid) return;
  grid.innerHTML = '';
  items.forEach(item => grid.appendChild(buildCell(item)));
}

// Build all grids
Object.entries(seionRows).forEach(([k,v]) => buildGrid('grid-'+k, v));
Object.entries(dakutenRows).forEach(([k,v]) => buildGrid('grid-'+k, v));
buildGrid('grid-youon', youonList);

// ── Toggle romaji ──
function toggleRomaji() {
  showRomaji = !showRomaji;
  const btn = document.getElementById('toggle-btn');
  btn.textContent = showRomaji ? '🔤 遮蔽讀音' : '👁 顯示讀音';
  btn.classList.toggle('active', !showRomaji);
  document.querySelectorAll('.kana-roman').forEach(el => {
    el.classList.toggle('hidden', !showRomaji);
  });
}

// ── Section tabs ──
function showSection(name) {
  ['seion','dakuten','youon'].forEach(s => {
    document.getElementById('section-'+s).style.display = s === name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['seion','dakuten','youon'][i] === name);
  });
}

// ── Random highlight ──
let highlighted = null;
function highlightRandom() {
  clearHighlight();
  const cells = Array.from(document.querySelectorAll('.kana-cell:not(.empty)'));
  if (!cells.length) return;
  const pick = cells[Math.floor(Math.random()*cells.length)];
  pick.style.borderColor = 'var(--amber)';
  pick.style.boxShadow = '0 0 16px rgba(245,166,35,0.4)';
  pick.style.background = 'rgba(245,166,35,0.10)';
  highlighted = pick;
  // scroll into view
  pick.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function clearHighlight() {
  if (highlighted) {
    highlighted.style.borderColor = '';
    highlighted.style.boxShadow = '';
    highlighted.style.background = '';
    highlighted = null;
  }
}

// ── Clock ──
const weekdays = ['日','一','二','三','四','五','六'];
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  document.getElementById('date-display').textContent =
    `${now.getFullYear()} · ${now.getMonth()+1}/${String(now.getDate()).padStart(2,'0')} 週${weekdays[now.getDay()]}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── Rain ──
const rainEl = document.getElementById('rain');
for (let i = 0; i < 60; i++) {
  const d = document.createElement('div');
  d.className = 'raindrop';
  const h = 40 + Math.random()*80;
  d.style.cssText = `left:${Math.random()*100}%;height:${h}px;animation-duration:${0.5+Math.random()*0.8}s;animation-delay:${Math.random()*2}s;opacity:${0.1+Math.random()*0.2}`;
  rainEl.appendChild(d);
}
</script>
</body>
</html>
